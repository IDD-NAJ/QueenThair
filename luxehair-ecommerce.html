<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LUXE HAIR — Premium Hair Collections</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root {
  --black: #111010;
  --charcoal: #2A2825;
  --dark-brown: #3B2E25;
  --mid-brown: #5C4A3A;
  --gold: #B09B72;
  --gold-light: #C8B48F;
  --gold-muted: #8C7B5E;
  --cream: #F7F3EE;
  --warm-white: #FAF8F5;
  --neutral-100: #EDE8E1;
  --neutral-200: #DDD7CE;
  --neutral-300: #C5BDB2;
  --neutral-400: #9E9589;
  --neutral-500: #7A7269;
  --neutral-600: #574F47;
  --text-primary: #1C1A18;
  --text-secondary: #5A524A;
  --text-muted: #8C8278;
  --border: #E2DDD6;
  --border-dark: #C8C0B5;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
  --radius: 2px;
  --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--warm-white);color:var(--text-primary);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
button{cursor:pointer;border:none;background:none;font-family:inherit}
img{max-width:100%;display:block}
input,textarea,select{font-family:inherit}
ul{list-style:none}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--neutral-100)}
::-webkit-scrollbar-thumb{background:var(--neutral-300);border-radius:10px}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.96)}to{opacity:1;transform:scale(1)}}

.fade-up{animation:fadeUp 0.5s ease both}
.fade-in{animation:fadeIn 0.4s ease both}

/* TOP BAR */
.top-bar{background:var(--charcoal);color:var(--neutral-300);font-size:12px;letter-spacing:0.06em;text-align:center;padding:8px 20px;display:flex;align-items:center;justify-content:space-between}
.top-bar-center{display:flex;gap:28px;align-items:center}
.top-bar-right{display:flex;gap:16px;align-items:center}
.top-bar a{color:var(--neutral-300);transition:color var(--transition)}
.top-bar a:hover{color:var(--gold-light)}

/* HEADER */
.header{background:var(--warm-white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:1000;transition:box-shadow var(--transition)}
.header.scrolled{box-shadow:var(--shadow-md)}
.header-inner{max-width:1440px;margin:0 auto;padding:0 40px;display:flex;align-items:center;gap:32px;height:68px}
.logo{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:500;letter-spacing:0.12em;color:var(--charcoal);white-space:nowrap}
.logo span{color:var(--gold)}

/* MEGA NAV */
.main-nav{flex:1;display:flex;align-items:center;gap:0}
.nav-item{position:relative}
.nav-link{font-size:12.5px;letter-spacing:0.1em;text-transform:uppercase;font-weight:500;color:var(--text-secondary);padding:8px 16px;cursor:pointer;transition:color var(--transition);white-space:nowrap;display:flex;align-items:center;gap:4px}
.nav-link:hover,.nav-link.active{color:var(--charcoal)}
.nav-link::after{content:'';position:absolute;bottom:-1px;left:16px;right:16px;height:1px;background:var(--gold);transform:scaleX(0);transition:transform var(--transition)}
.nav-link:hover::after{transform:scaleX(1)}
.nav-chevron{font-size:9px;transition:transform var(--transition)}
.nav-item:hover .nav-chevron{transform:rotate(180deg)}

.mega-menu{position:absolute;top:100%;left:50%;transform:translateX(-50%);background:var(--warm-white);border:1px solid var(--border);border-top:2px solid var(--gold);box-shadow:var(--shadow-lg);min-width:720px;padding:28px 32px;display:none;animation:slideDown 0.2s ease;z-index:999}
.nav-item:hover .mega-menu{display:flex;gap:32px}
.mega-col{min-width:160px}
.mega-col-title{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;font-weight:600;color:var(--text-muted);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.mega-link{display:block;font-size:13px;color:var(--text-secondary);padding:5px 0;transition:color var(--transition)}
.mega-link:hover{color:var(--charcoal)}
.mega-feature{background:var(--neutral-100);padding:16px;border-radius:var(--radius);min-width:180px}
.mega-feature img{width:100%;height:120px;object-fit:cover;margin-bottom:10px;border-radius:var(--radius)}
.mega-feature-title{font-size:13px;font-weight:500;color:var(--charcoal);margin-bottom:4px}
.mega-feature-sub{font-size:11px;color:var(--text-muted)}

/* HEADER RIGHT */
.header-actions{display:flex;align-items:center;gap:6px}
.action-btn{width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius);color:var(--text-secondary);transition:all var(--transition);position:relative}
.action-btn:hover{background:var(--neutral-100);color:var(--charcoal)}
.action-btn svg{width:18px;height:18px;stroke-width:1.5}
.badge{position:absolute;top:4px;right:4px;background:var(--gold);color:white;font-size:9px;font-weight:600;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center}

/* SEARCH BAR */
.search-bar{flex:1;max-width:340px;position:relative}
.search-input{width:100%;background:var(--neutral-100);border:1px solid var(--border);border-radius:var(--radius);padding:9px 36px 9px 14px;font-size:13px;color:var(--text-primary);transition:all var(--transition);outline:none}
.search-input:focus{background:white;border-color:var(--gold);box-shadow:0 0 0 3px rgba(176,155,114,0.1)}
.search-icon{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--text-muted)}
.search-icon svg{width:16px;height:16px;stroke-width:1.5}

/* HERO */
.hero{position:relative;height:600px;background:linear-gradient(135deg,#1C1A18 0%,#2E2620 45%,#3B2E25 100%);overflow:hidden;display:flex;align-items:center}
.hero-bg{position:absolute;inset:0;opacity:0.15;background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23B09B72' fill-opacity='0.3'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
.hero-content{position:relative;z-index:2;max-width:1440px;margin:0 auto;padding:0 80px;width:100%}
.hero-eyebrow{font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-bottom:16px;display:flex;align-items:center;gap:12px}
.hero-eyebrow::before{content:'';width:32px;height:1px;background:var(--gold)}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:62px;font-weight:300;color:white;line-height:1.1;margin-bottom:20px}
.hero-title strong{font-weight:500;font-style:italic;color:var(--gold-light)}
.hero-sub{font-size:15px;color:rgba(255,255,255,0.6);max-width:440px;margin-bottom:36px;line-height:1.7}
.hero-actions{display:flex;gap:14px;align-items:center}
.btn-primary{background:var(--gold);color:white;padding:13px 32px;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;font-weight:500;border-radius:var(--radius);transition:all var(--transition);display:inline-flex;align-items:center;gap:8px}
.btn-primary:hover{background:var(--gold-light);transform:translateY(-1px);box-shadow:0 6px 20px rgba(176,155,114,0.4)}
.btn-outline{border:1px solid rgba(255,255,255,0.3);color:rgba(255,255,255,0.8);padding:13px 28px;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;font-weight:500;border-radius:var(--radius);transition:all var(--transition)}
.btn-outline:hover{border-color:rgba(255,255,255,0.7);color:white}
.hero-stats{position:absolute;bottom:40px;right:80px;display:flex;gap:40px}
.stat-item{text-align:right}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:400;color:white;line-height:1}
.stat-label{font-size:11px;letter-spacing:0.1em;color:rgba(255,255,255,0.4);text-transform:uppercase;margin-top:4px}
.hero-badge{position:absolute;right:80px;top:40%;transform:translateY(-50%);width:120px;height:120px;border:1px solid rgba(176,155,114,0.3);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center}
.hero-badge-text{font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--gold-light);font-style:italic;line-height:1.3}

/* PROMO BAR */
.promo-bar{background:var(--neutral-100);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:48px;padding:14px;overflow:hidden}
.promo-item{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--text-secondary);letter-spacing:0.04em;white-space:nowrap}
.promo-item svg{width:16px;height:16px;color:var(--gold);flex-shrink:0}

/* SECTION */
.section{padding:72px 0}
.section-inner{max-width:1440px;margin:0 auto;padding:0 40px}
.section-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:40px}
.section-eyebrow{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.section-eyebrow::before{content:'';width:20px;height:1px;background:var(--gold)}
.section-title{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:400;color:var(--charcoal);line-height:1.2}
.section-link{font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold-muted);display:flex;align-items:center;gap:6px;transition:color var(--transition)}
.section-link:hover{color:var(--gold)}

/* CATEGORY GRID */
.category-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px}
.cat-card{position:relative;overflow:hidden;border-radius:var(--radius);cursor:pointer}
.cat-card:first-child,.cat-card:nth-child(2){grid-column:span 2;grid-row:span 2}
.cat-card:nth-child(3),.cat-card:nth-child(4){grid-column:span 2}
.cat-img{width:100%;height:100%;min-height:200px;object-fit:cover;transition:transform 0.6s cubic-bezier(0.4,0,0.2,1)}
.cat-card:hover .cat-img{transform:scale(1.04)}
.cat-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(20,16,12,0.75) 0%,transparent 50%);transition:opacity var(--transition)}
.cat-info{position:absolute;bottom:20px;left:20px;right:20px;color:white}
.cat-name{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;margin-bottom:4px}
.cat-count{font-size:11px;letter-spacing:0.08em;color:rgba(255,255,255,0.6)}
.cat-btn{display:inline-flex;align-items:center;gap:4px;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--gold-light);margin-top:6px;transition:gap var(--transition)}
.cat-card:hover .cat-btn{gap:8px}

/* PRODUCT GRID */
.product-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px}
.product-grid-5{grid-template-columns:repeat(5,1fr)}

.product-card{background:white;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);transition:all var(--transition);position:relative}
.product-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-3px);border-color:var(--border-dark)}
.product-img-wrap{position:relative;overflow:hidden;aspect-ratio:3/4;background:var(--neutral-100)}
.product-img{width:100%;height:100%;object-fit:cover;transition:transform 0.6s cubic-bezier(0.4,0,0.2,1)}
.product-img-alt{width:100%;height:100%;object-fit:cover;transition:opacity 0.4s ease;position:absolute;inset:0;opacity:0}
.product-card:hover .product-img-alt{opacity:1}
.product-card:hover .product-img{transform:scale(1.03)}
.product-badges{position:absolute;top:12px;left:12px;display:flex;flex-direction:column;gap:5px;z-index:2}
.badge-sale{background:#8B4513;color:white;font-size:9px;font-weight:600;letter-spacing:0.08em;padding:3px 8px;border-radius:var(--radius)}
.badge-new{background:var(--charcoal);color:white;font-size:9px;font-weight:600;letter-spacing:0.08em;padding:3px 8px;border-radius:var(--radius)}
.badge-hot{background:var(--gold);color:white;font-size:9px;font-weight:600;letter-spacing:0.08em;padding:3px 8px;border-radius:var(--radius)}
.product-actions{position:absolute;right:10px;top:10px;display:flex;flex-direction:column;gap:6px;opacity:0;transform:translateX(8px);transition:all var(--transition);z-index:2}
.product-card:hover .product-actions{opacity:1;transform:translateX(0)}
.product-action-btn{width:34px;height:34px;background:white;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-md);transition:all var(--transition);color:var(--text-secondary)}
.product-action-btn:hover{background:var(--charcoal);color:white}
.product-action-btn.wishlisted{color:#c0392b}
.product-action-btn svg{width:15px;height:15px;stroke-width:1.5}
.product-quick-add{position:absolute;bottom:0;left:0;right:0;background:var(--charcoal);color:white;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;font-weight:500;padding:11px;text-align:center;transform:translateY(100%);transition:transform var(--transition)}
.product-card:hover .product-quick-add{transform:translateY(0)}
.product-info{padding:14px 14px 16px}
.product-name{font-size:13px;font-weight:400;color:var(--text-primary);margin-bottom:6px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.product-rating{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.stars{display:flex;gap:2px}
.star{color:var(--gold);font-size:11px}
.star.empty{color:var(--neutral-300)}
.review-count{font-size:11px;color:var(--text-muted)}
.product-pricing{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.price-current{font-size:15px;font-weight:600;color:var(--charcoal)}
.price-original{font-size:13px;color:var(--text-muted);text-decoration:line-through}
.price-save{font-size:11px;color:#8B4513;font-weight:500}
.product-variants{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.variant-dot{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--border);cursor:pointer;transition:border-color var(--transition)}
.variant-dot:hover,.variant-dot.active{border-color:var(--charcoal)}

/* FILTERS SIDEBAR */
.catalog-layout{display:grid;grid-template-columns:240px 1fr;gap:32px;align-items:start}
.filter-sidebar{position:sticky;top:88px}
.filter-section{border-bottom:1px solid var(--border);padding:18px 0}
.filter-section:first-child{padding-top:0}
.filter-title{font-size:12px;letter-spacing:0.1em;text-transform:uppercase;font-weight:600;color:var(--charcoal);margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.filter-toggle{font-size:16px;color:var(--text-muted);transition:transform var(--transition)}
.filter-option{display:flex;align-items:center;gap:10px;padding:4px 0;cursor:pointer}
.filter-option input[type=checkbox]{width:14px;height:14px;accent-color:var(--gold);cursor:pointer}
.filter-option-label{font-size:13px;color:var(--text-secondary);transition:color var(--transition)}
.filter-option:hover .filter-option-label{color:var(--charcoal)}
.filter-option-count{font-size:11px;color:var(--text-muted);margin-left:auto}
.color-swatches{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.swatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color var(--transition)}
.swatch:hover,.swatch.active{border-color:var(--charcoal)}
.price-range{padding:8px 0}
.price-slider{width:100%;accent-color:var(--gold);cursor:pointer}
.price-labels{display:flex;justify-content:space-between;font-size:12px;color:var(--text-secondary);margin-top:6px}

/* TOOLBAR */
.catalog-toolbar{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border);margin-bottom:24px}
.result-count{font-size:13px;color:var(--text-secondary)}
.toolbar-right{display:flex;align-items:center;gap:16px}
.sort-select{font-size:13px;color:var(--text-secondary);border:1px solid var(--border);border-radius:var(--radius);padding:7px 12px;background:white;cursor:pointer;outline:none}
.view-toggle{display:flex;gap:4px}
.view-btn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius);color:var(--text-muted);transition:all var(--transition)}
.view-btn.active,.view-btn:hover{background:var(--neutral-100);color:var(--charcoal)}
.view-btn svg{width:15px;height:15px}

/* PRODUCT DETAIL */
.pdp-layout{display:grid;grid-template-columns:1fr 480px;gap:48px;align-items:start;max-width:1200px;margin:0 auto;padding:40px}
.pdp-gallery{position:sticky;top:88px}
.gallery-main{aspect-ratio:3/4;background:var(--neutral-100);border-radius:var(--radius);overflow:hidden;margin-bottom:10px}
.gallery-main img{width:100%;height:100%;object-fit:cover}
.gallery-thumbs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.gallery-thumb{aspect-ratio:1;background:var(--neutral-100);border-radius:var(--radius);overflow:hidden;border:2px solid transparent;cursor:pointer;transition:border-color var(--transition)}
.gallery-thumb.active,.gallery-thumb:hover{border-color:var(--gold)}
.gallery-thumb img{width:100%;height:100%;object-fit:cover}

/* PDP INFO */
.pdp-breadcrumb{font-size:12px;color:var(--text-muted);margin-bottom:16px;display:flex;align-items:center;gap:6px}
.pdp-breadcrumb span{color:var(--charcoal)}
.pdp-brand{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.pdp-title{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:400;color:var(--charcoal);line-height:1.2;margin-bottom:12px}
.pdp-rating{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.pdp-price{display:flex;align-items:baseline;gap:12px;margin-bottom:24px}
.pdp-price-current{font-size:28px;font-weight:600;color:var(--charcoal)}
.pdp-price-original{font-size:18px;color:var(--text-muted);text-decoration:line-through}
.pdp-price-save{font-size:13px;background:rgba(139,69,19,0.1);color:#8B4513;padding:3px 10px;border-radius:var(--radius)}

.variant-section{margin-bottom:22px}
.variant-label{font-size:12px;letter-spacing:0.08em;text-transform:uppercase;font-weight:500;color:var(--text-secondary);margin-bottom:10px}
.variant-label span{color:var(--charcoal);font-weight:600}
.color-variants{display:flex;gap:8px;flex-wrap:wrap}
.color-swatch-lg{width:44px;height:44px;border-radius:var(--radius);cursor:pointer;border:2px solid transparent;transition:all var(--transition);position:relative;overflow:hidden}
.color-swatch-lg img{width:100%;height:100%;object-fit:cover}
.color-swatch-lg.active{border-color:var(--charcoal);box-shadow:0 0 0 2px var(--charcoal)}
.size-variants{display:flex;gap:8px;flex-wrap:wrap}
.size-btn{min-width:52px;height:36px;border:1px solid var(--border);border-radius:var(--radius);font-size:12px;color:var(--text-secondary);padding:0 12px;transition:all var(--transition);cursor:pointer;background:white}
.size-btn:hover,.size-btn.active{border-color:var(--charcoal);background:var(--charcoal);color:white}
.size-btn.unavailable{opacity:0.35;cursor:not-allowed;text-decoration:line-through}

.qty-section{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.qty-control{display:flex;align-items:center;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.qty-btn{width:36px;height:40px;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text-secondary);transition:all var(--transition);cursor:pointer}
.qty-btn:hover{background:var(--neutral-100);color:var(--charcoal)}
.qty-val{width:44px;text-align:center;font-size:14px;font-weight:500;color:var(--charcoal);border-left:1px solid var(--border);border-right:1px solid var(--border);height:40px;display:flex;align-items:center;justify-content:center}
.add-to-cart-btn{flex:1;background:var(--charcoal);color:white;padding:14px 24px;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;font-weight:500;border-radius:var(--radius);transition:all var(--transition);display:flex;align-items:center;justify-content:center;gap:8px}

/* BANNER */
.banner-section{background:var(--charcoal);padding:56px 40px;position:relative;overflow:hidden}
.banner-bg-pattern{position:absolute;inset:0;opacity:0.04;background-image:url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff'%3E%3Ccircle cx='20' cy='20' r='2'/%3E%3C/g%3E%3C/svg%3E")}
.banner-inner{max-width:800px;margin:0 auto;text-align:center;position:relative;z-index:1}
.banner-eyebrow{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-bottom:12px}
.banner-title{font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:300;color:white;margin-bottom:12px}

.banner-sub{font-size:14px;color:rgba(255,255,255,0.55);margin-bottom:28px}
.newsletter-form{display:flex;max-width:440px;margin:0 auto;gap:8px}
.newsletter-input{flex:1;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:var(--radius);padding:12px 16px;font-size:13px;color:white;outline:none;transition:all var(--transition)}
.newsletter-input::placeholder{color:rgba(255,255,255,0.4)}
.newsletter-input:focus{background:rgba(255,255,255,0.15);border-color:var(--gold)}
.newsletter-btn{background:var(--gold);color:white;padding:12px 24px;border-radius:var(--radius);font-size:12px;letter-spacing:0.1em;text-transform:uppercase;font-weight:500;transition:all var(--transition);white-space:nowrap}
.newsletter-btn:hover{background:var(--gold-light)}

/* FOOTER */
.footer{background:var(--charcoal);color:var(--neutral-400);padding-top:64px}
.footer-inner{max-width:1440px;margin:0 auto;padding:0 40px;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:48px;margin-bottom:48px}
.footer-brand .logo{color:white;margin-bottom:16px;display:block;font-size:22px}
.footer-desc{font-size:13px;line-height:1.8;max-width:260px;margin-bottom:20px}
.footer-social{display:flex;gap:10px}
.social-icon{width:36px;height:36px;border:1px solid rgba(255,255,255,0.15);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;color:var(--neutral-400);transition:all var(--transition)}
.social-icon:hover{border-color:var(--gold);color:var(--gold)}
.social-icon svg{width:16px;height:16px}
.footer-col-title{font-size:11px;letter-spacing:0.14em;text-transform:uppercase;font-weight:600;color:white;margin-bottom:16px}
.footer-links{display:flex;flex-direction:column;gap:8px}
.footer-link{font-size:13px;color:var(--neutral-400);transition:color var(--transition);cursor:pointer}
.footer-link:hover{color:var(--gold-light)}
.footer-bottom{border-top:1px solid rgba(255,255,255,0.08);padding:20px 40px;display:flex;align-items:center;justify-content:space-between;max-width:1440px;margin:0 auto}
.footer-bottom-left{font-size:12px;color:var(--neutral-500)}
.footer-payment{display:flex;gap:8px;align-items:center}
.payment-icon{background:rgba(255,255,255,0.08);border-radius:3px;padding:4px 8px;font-size:10px;color:var(--neutral-400);letter-spacing:0.06em;font-weight:600}

/* INFO PAGES */
.info-page{max-width:800px;margin:0 auto;padding:48px 40px}
.info-title{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:400;color:var(--charcoal);margin-bottom:8px}
.info-sub{font-size:14px;color:var(--text-muted);margin-bottom:36px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.info-h2{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:400;color:var(--charcoal);margin:28px 0 12px}
.info-p{font-size:14px;color:var(--text-secondary);line-height:1.8;margin-bottom:12px}
.info-ul{padding-left:20px;margin-bottom:14px}
.info-ul li{font-size:14px;color:var(--text-secondary);line-height:1.7;margin-bottom:4px}

/* BREADCRUMB */
.breadcrumb{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-muted);margin-bottom:28px;flex-wrap:wrap}
.breadcrumb-sep{color:var(--neutral-300)}

/* PAGE BANNER */
.page-banner{background:linear-gradient(to right,var(--charcoal),var(--dark-brown));padding:36px 40px;margin-bottom:0}
.page-banner-inner{max-width:1440px;margin:0 auto;padding:0}
.page-banner-title{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:400;color:white;margin-bottom:4px}
.page-banner-sub{font-size:13px;color:rgba(255,255,255,0.5)}

/* TRUST BADGES */
.trust-section{background:white;border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:32px 0}
.trust-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;max-width:1440px;margin:0 auto;padding:0 40px}
.trust-item{text-align:center;padding:16px}

.trust-title{font-size:13px;font-weight:600;color:var(--charcoal);margin-bottom:4px}
.trust-sub{font-size:12px;color:var(--text-muted)}

/* TABS */
.filter-tags{display:flex;gap:8px;margin-bottom:28px;flex-wrap:wrap}

.review-card{padding:20px 0;border-bottom:1px solid var(--border)}

.reviewer{font-size:13px;font-weight:500;color:var(--charcoal)}
.review-date{font-size:12px;color:var(--text-muted)}
.review-text{font-size:13px;color:var(--text-secondary);line-height:1.7}
.verified{font-size:11px;color:var(--gold);margin-top:6px}

/* MOBILE */
.mobile-menu-btn{display:none}
@media(max-width:1100px){

}

}

/* NOTIFICATION TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--charcoal);color:white;padding:14px 20px;border-radius:var(--radius);font-size:13px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow-lg);z-index:3000;animation:slideDown 0.3s ease;min-width:240px}

.search-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1500;display:flex;flex-direction:column;align-items:center;padding-top:80px;opacity:0;pointer-events:none;transition:opacity var(--transition)}
.search-overlay.open{opacity:1;pointer-events:all}
.search-box{background:white;width:100%;max-width:680px;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-lg)}
.search-box-input{width:100%;border:none;padding:18px 20px;font-size:16px;color:var(--text-primary);outline:none;border-bottom:1px solid var(--border)}
.search-results{padding:16px}
.search-result-item{display:flex;align-items:center;gap:12px;padding:10px;border-radius:var(--radius);cursor:pointer;transition:background var(--transition)}
.search-result-item:hover{background:var(--neutral-100)}
.search-result-img{width:44px;height:56px;background:var(--neutral-200);border-radius:var(--radius);object-fit:cover}
.search-result-info{flex:1}
.search-result-name{font-size:13px;font-weight:500;color:var(--charcoal)}
.search-result-price{font-size:12px;color:var(--gold)}

/* MISC */
.divider{height:1px;background:var(--border);margin:32px 0}
.tag{display:inline-block;background:var(--neutral-100);border:1px solid var(--border);border-radius:var(--radius);padding:3px 10px;font-size:11px;color:var(--text-secondary);letter-spacing:0.06em}
.page-wrap{min-height:100vh}
.img-placeholder{background:linear-gradient(135deg,#E8E3DC,#D4CCC3);width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--neutral-400)}
.img-placeholder svg{width:28px;height:28px}
.order-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:16px;padding:16px 0;border-bottom:1px solid var(--border);align-items:center;font-size:13px}
.status-badge{padding:4px 10px;border-radius:var(--radius);font-size:11px;font-weight:500;letter-spacing:0.06em}

.pagination{display:flex;gap:6px;justify-content:center;margin-top:40px}

.page-btn:hover,.page-btn.active{background:var(--charcoal);border-color:var(--charcoal);color:white}

/* ─── CONTEXT ─── */
const AppCtx = createContext();
function AppProvider({children}){
  const [page,setPage]=useState({name:'home',data:{}});
  const [cart,setCart]=useState([]);
  const [wishlist,setWishlist]=useState([]);
  const [cartOpen,setCartOpen]=useState(false);
  const [searchOpen,setSearchOpen]=useState(false);
  const [toast,setToast]=useState(null);
  const [scrolled,setScrolled]=useState(false);

  useEffect(()=>{
    const h=()=>setScrolled(window.scrollY>40);
    window.addEventListener('scroll',h);
    return()=>window.removeEventListener('scroll',h);
  },[]);

  const showToast=(msg)=>{
    setToast(msg);
    setTimeout(()=>setToast(null),3000);
  };

  const addToCart=(product,opts={})=>{
    setCart(prev=>{
      const key=`${product.id}-${JSON.stringify(opts)}`;
      const ex=prev.find(i=>i.key===key);
      if(ex) return prev.map(i=>i.key===key?{...i,qty:i.qty+1}:i);
      return [...prev,{...product,qty:1,opts,key}];
    });
    showToast('Added to cart');
    setCartOpen(true);
  };

  const removeFromCart=(key)=>setCart(prev=>prev.filter(i=>i.key!==key));
  const updateQty=(key,delta)=>setCart(prev=>prev.map(i=>i.key===key?{...i,qty:Math.max(1,i.qty+delta)}:i));
  const toggleWishlist=(id)=>{
    setWishlist(prev=>prev.includes(id)?prev.filter(i=>i!==id):[...prev,id]);
    showToast(wishlist.includes(id)?'Removed from wishlist':'Added to wishlist');
  };

  const cartTotal=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const cartCount=cart.reduce((s,i)=>s+i.qty,0);

  return <AppCtx.Provider value={{page,setPage,cart,addToCart,removeFromCart,updateQty,wishlist,toggleWishlist,cartOpen,setCartOpen,cartTotal,cartCount,searchOpen,setSearchOpen,toast,showToast}}>
    {children}
  </AppCtx.Provider>;
}
const useApp=()=>useContext(AppCtx);

/* ─── STARS ─── */
function Stars({rating,size=11}){
  const full=Math.floor(rating),half=rating%1>=0.5;
  return <div className="stars" style={{fontSize:size+'px'}}>
    {Array.from({length:5},(_,i)=><span key={i} className={i<full?'star':'star empty'}>★</span>)}
  </div>;
}

/* ─── IMG PLACEHOLDER ─── */
function Img({style={},className='',seed=1}){
  const hues=['#C4B49A','#B8A882','#D4C8B4','#A89070','#C8B89A','#E0D4BC'];
  const bg=hues[seed%hues.length];
  return <div style={{...style,background:`linear-gradient(135deg,${bg},${hues[(seed+2)%hues.length]})`,display:'flex',alignItems:'center',justifyContent:'center',width:'100%',height:'100%'}} className={className}>
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" strokeWidth="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
  </div>;
}

function ProductCard({p,onQuickView}){
  const {addToCart,toggleWishlist,wishlist,setPage}=useApp();
  const wishlisted=wishlist.includes(p.id);
  const [activeColor,setActiveColor]=useState(0);
  return <div className="product-card fade-up" onClick={()=>setPage({name:'product',data:{id:p.id}})}>
    <div className="product-img-wrap">
      <Img seed={p.id} style={{position:'absolute',inset:0}}/>
      <div className="product-badges">
        {p.isNew&&<span className="badge-new">NEW</span>}
        {p.isSale&&<span className="badge-sale">SALE</span>}
        {p.isHot&&<span className="badge-hot">HOT</span>}
      </div>
      <div className="product-actions">
        <button className={`product-action-btn${wishlisted?' wishlisted':''}`} onClick={e=>{e.stopPropagation();toggleWishlist(p.id)}} title="Wishlist">
          <I.heart/>
        </button>
        <button className="product-action-btn" onClick={e=>{e.stopPropagation();onQuickView&&onQuickView(p)}} title="Quick View">
          <I.eye/>
        </button>
      </div>
      <button className="product-quick-add" onClick={e=>{e.stopPropagation();addToCart(p)}}>Add to Cart</button>
    </div>
    <div className="product-info">
      <div className="product-name">{p.name}</div>
      <div className="product-rating"><Stars rating={parseFloat(p.rating)}/><span className="review-count">({p.reviews})</span></div>
      <div className="product-pricing">
        <span className="price-current">${p.price}</span>
        {p.originalPrice&&<><span className="price-original">${p.originalPrice}</span><span className="price-save">Save ${p.originalPrice-p.price}</span></>}
      </div>
      <div className="product-variants">
        {p.colors.map((c,i)=><div key={i} className={`variant-dot${activeColor===i?' active':''}`} style={{background:c.hex}} onClick={e=>{e.stopPropagation();setActiveColor(i)}} title={c.key}/>)}
      </div>
    </div>
  </div>;
}

/* ─── CATALOG PAGE ─── */
function CatalogPage({data={}}){
  const {setPage}=useApp();
  const [sort,setSort]=useState('featured');
  const [view,setView]=useState('grid');
  const [priceMax,setPriceMax]=useState(500);
  const [selectedColors,setSelectedColors]=useState([]);
  const [page,setPageNum]=useState(1);
  const perPage=12;

  let products=PRODUCTS;
  if(data.filter==='sale') products=products.filter(p=>p.isSale);
  if(data.filter==='new') products=products.filter(p=>p.isNew);
  if(data.cat&&!['New Arrivals','Best Sellers'].includes(data.cat))
    products=products.filter(p=>p.category===data.cat||p.name.toLowerCase().includes((data.cat||'').toLowerCase()));

  products=products.filter(p=>p.price<=priceMax);
  if(sort==='price-low') products=[...products].sort((a,b)=>a.price-b.price);
  if(sort==='price-high') products=[...products].sort((a,b)=>b.price-a.price);
  if(sort==='rating') products=[...products].sort((a,b)=>b.rating-a.rating);
  if(sort==='reviews') products=[...products].sort((a,b)=>b.reviews-a.reviews);

  const total=products.length;
  const paged=products.slice((page-1)*perPage,page*perPage);
  const totalPages=Math.ceil(total/perPage);

  return <div>
    <div className="page-banner">
      <div className="page-banner-inner">
        <div className="breadcrumb">
          <span style={{cursor:'pointer'}} onClick={()=>setPage({name:'home'})}>Home</span>
          <span className="breadcrumb-sep">›</span>
          <span>{data.cat||'All Products'}</span>
        </div>
        <div className="page-banner-title">{data.cat||'All Products'}</div>
        <div className="page-banner-sub">{total} styles available</div>
      </div>
    </div>
    <div className="section-inner" style={{padding:'32px 40px'}}>
      <div className="catalog-layout">
        {/* FILTERS */}
        <aside className="filter-sidebar">
          <div style={{fontFamily:'Cormorant Garamond,serif',fontSize:18,fontWeight:400,color:'var(--charcoal)',marginBottom:16,paddingBottom:12,borderBottom:'1px solid var(--border)'}}>Filters</div>
          <div className="filter-section">
            <div className="filter-title">Categories</div>
            {CATEGORIES.map(c=><label key={c.id} className="filter-option">
              <input type="checkbox"/><span className="filter-option-label">{c.name}</span><span className="filter-option-count">{c.count}</span>
            </label>)}
          </div>
          <div className="filter-section">
            <div className="filter-title">Price Range</div>
            <div className="price-range">
              <input type="range" className="price-slider" min="0" max="500" value={priceMax} onChange={e=>setPriceMax(+e.target.value)}/>
              <div className="price-labels"><span>$0</span><span>${priceMax}</span></div>
            </div>
          </div>
          <div className="filter-section">
            <div className="filter-title">Hair Color</div>
            <div className="color-swatches">
              {Object.entries(COLORS).slice(0,8).map(([k,v])=><div key={k} className={`swatch${selectedColors.includes(k)?' active':''}`} style={{background:v.startsWith('#')?v:'linear-gradient(45deg,#111,#C19A6B)'}} title={k} onClick={()=>setSelectedColors(p=>p.includes(k)?p.filter(c=>c!==k):[...p,k])}/>)}
            </div>
          </div>
          <div className="filter-section">
            <div className="filter-title">Hair Length</div>
            {['10"–12"','14"–16"','18"–20"','22"–24"','26"+'].map(l=><label key={l} className="filter-option">
              <input type="checkbox"/><span className="filter-option-label">{l}</span>
            </label>)}
          </div>
          <div className="filter-section">
            <div className="filter-title">Lace Type</div>
            {['HD Lace','Transparent Lace','Swiss Lace','Regular Lace'].map(l=><label key={l} className="filter-option">
              <input type="checkbox"/><span className="filter-option-label">{l}</span>
            </label>)}
          </div>
          <div className="filter-section">
            <div className="filter-title">Density</div>
            {['130%','150%','180%','200%'].map(d=><label key={d} className="filter-option">
              <input type="checkbox"/><span className="filter-option-label">{d} Density</span>
            </label>)}
          </div>
          <div className="filter-section">
            <div className="filter-title">Availability</div>
            <label className="filter-option"><input type="checkbox"/><span className="filter-option-label">In Stock Only</span></label>
          </div>
          <button className="btn-full" style={{marginTop:16}}>Apply Filters</button>
        </aside>

        {/* PRODUCTS */}
        <div>
          <div className="catalog-toolbar">
            <span className="result-count">Showing {(page-1)*perPage+1}–{Math.min(page*perPage,total)} of {total} products</span>
            <div className="toolbar-right">
              <select className="sort-select" value={sort} onChange={e=>setSort(e.target.value)}>
                <option value="featured">Featured</option>
                <option value="price-low">Price: Low to High</option>
                <option value="price-high">Price: High to Low</option>
                <option value="rating">Top Rated</option>
                <option value="reviews">Most Reviews</option>
              </select>
              <div className="view-toggle">
                <div className={`view-btn${view==='grid'?' active':''}`} onClick={()=>setView('grid')}><I.grid/></div>
                <div className={`view-btn${view==='list'?' active':''}`} onClick={()=>setView('list')}><I.list/></div>
              </div>
            </div>
          </div>
          <div className="product-grid">
            {paged.map(p=><ProductCard key={p.id} p={p}/>)}
          </div>
          <div className="pagination">
            <div className="page-btn" onClick={()=>setPageNum(p=>Math.max(1,p-1))}>‹</div>

          </div>
        </div>
      </div>
    </div>
  </div>;
}

/* ─── ROUTER ─── */
function Router(){
  const {page}=useApp();
  const {name,data={}}=page;
  const pages={
    home:<HomePage/>,
    catalog:<CatalogPage data={data}/>,
    product:<ProductPage data={data}/>,
    wishlist:<WishlistPage/>,
    cart:<CartPageFull/>,
    checkout:<CheckoutPage/>,
    'order-success':<OrderSuccess/>,
    account:<AccountPage/>,
    login:<LoginPage/>,
    register:<RegisterPage/>,
    about:<AboutPage/>,
    shipping:<ShippingPage/>,
    returns:<ReturnsPage/>,
    faq:<FAQPage/>,
    contact:<ContactPage/>,
  };
  return pages[name]||<HomePage/>;
}

/* ─── APP ─── */
function App(){
  const {page}=useApp();
  const isFullBleed=['home','login','register','order-success'].includes(page.name);
  useEffect(()=>{window.scrollTo({top:0,behavior:'smooth'});},[page.name]);
  return <div className="page-wrap">
    <TopBar/>
    <Header/>
    <main>
      <Router/>
    </main>
    {!isFullBleed&&<TrustSection/>}
    <Footer/>
    <CartDrawer/>
    <SearchOverlay/>
    <Toast/>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <AppProvider><App/></AppProvider>
);
</script>
</body>
</html>
